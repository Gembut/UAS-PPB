# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# AndroidX
android.useAndroidX=true
# Enable Jetifier to help with libraries that are not yet migrated to AndroidX
android.enableJetifier=true

# Force Gradle to use a valid JDK 21 rather than the incomplete JRE embedded in the VS Code Java extension
org.gradle.java.home=/Users/mbud/.gradle/jdks/eclipse_adoptium-21-aarch64-os_x.2/jdk-21.0.7+6/Contents/Home
